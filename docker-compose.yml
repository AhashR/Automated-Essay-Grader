version: '3.9'

services:
  feedback-agent:
    build: .
    container_name: hva-feedback-agent
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - FLASK_ENV=production
      # Add your environment variables here:
      # - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      # - SECRET_KEY=${SECRET_KEY}
    env_file:
      - .env
    volumes:
      # Optional: mount for persistent logs
      - ./logs:/app/logs
    restart: unless-stopped
    # Uncomment for resource limits
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '1'
    #       memory: 2G
    #     reservations:
    #       cpus: '0.5'
    #       memory: 1G
